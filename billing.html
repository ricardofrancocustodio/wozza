<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wozza | Minha Assinatura</title>
    <link rel="stylesheet" href="/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/adminlte/css/adminlte.min.css">
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('wozza-theme');
        var theme = (stored === 'dark' || stored === 'light')
          ? stored
          : ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (err) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="/dist/css/theme.css">
</head>
<body class="hold-transition sidebar-mini" data-auth="required" data-page="billing">
<div class="wrapper">

  <!-- Navbar -->
  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item dropdown">
        <a class="nav-link" data-toggle="dropdown" href="#" aria-label="Conta">
          <i class="fas fa-user-circle mr-1"></i><span data-user-name>Usuário</span>
        </a>
        <div class="dropdown-menu dropdown-menu-right">
          <span class="dropdown-item-text small text-muted" data-user-email></span>
          <div class="dropdown-divider"></div>
          <button type="button" class="dropdown-item" onclick="fazerLogout()">
            <i class="fas fa-sign-out-alt mr-2"></i>Sair
          </button>
        </div>
      </li>
    </ul>
  </nav>

  <!-- Sidebar -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a href="/dashboard" class="brand-link">
      <span class="brand-text font-weight-light ml-2">Wozza</span>
    </a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu" data-accordion="false">
          <li class="nav-item">
            <a href="/dashboard" class="nav-link">
              <i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="/social-monitor" class="nav-link">
              <i class="nav-icon fas fa-shield-alt"></i><p>Monitor Social</p>
            </a>
          </li>
          <li class="nav-item">
            <a href="/billing" class="nav-link active">
              <i class="nav-icon fas fa-credit-card"></i><p>Assinatura</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <div class="content-header">
      <div class="container-fluid">
        <h1 class="m-0">Minha Assinatura</h1>
      </div>
    </div>

    <div class="content">
      <div class="container-fluid">
        <div class="row">
          <div class="col-md-6">
            <div class="card card-outline card-primary" id="billing-card">
              <div class="card-header">
                <h5 class="card-title mb-0"><i class="fas fa-credit-card mr-2"></i>Plano atual</h5>
              </div>
              <div class="card-body" id="billing-body">
                <div class="text-center py-3">
                  <div class="spinner-border text-primary" role="status"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="main-footer">
    <strong>Copyright &copy; 2026 Wozza.</strong> Todos os direitos reservados.
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/dist/js/session.js"></script>
<script src="/adminlte/js/adminlte.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    // Fetch billing status
    let billing = {};
    try {
        const res = await fetch('/api/billing/status', { credentials: 'same-origin' });
        billing = await res.json();
    } catch (e) {
        document.getElementById('billing-body').innerHTML = '<p class="text-danger">Erro ao carregar status da assinatura.</p>';
        return;
    }

    function fmtBRL(cents) { return (cents / 100).toFixed(2).replace('.', ','); }
    function fmtDate(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    const statusLabels = {
        trialing:      '<span class="badge badge-info">Teste grátis</span>',
        active:        '<span class="badge badge-success">Ativo</span>',
        plan_required: '<span class="badge badge-warning">Plano não escolhido</span>',
        past_due:      '<span class="badge badge-danger">Pagamento pendente</span>',
        canceled:      '<span class="badge badge-secondary">Cancelado</span>',
        expired:       '<span class="badge badge-danger">Expirado</span>'
    };

    const statusBadge = statusLabels[billing.status] || `<span class="badge badge-secondary">${billing.status || '—'}</span>`;

    let trialInfo = '';
    if (billing.status === 'trialing' && billing.trial_days_left != null) {
        const urgency = billing.trial_days_left <= 1 ? 'text-danger font-weight-bold' : billing.trial_days_left <= 3 ? 'text-warning' : 'text-success';
        trialInfo = `
            <tr>
                <th>Dias restantes</th>
                <td class="${urgency}">${billing.trial_days_left} dia${billing.trial_days_left !== 1 ? 's' : ''}</td>
            </tr>
            <tr>
                <th>Fim do teste</th>
                <td>${fmtDate(billing.trial_ends_at)}</td>
            </tr>`;
    }

    document.getElementById('billing-body').innerHTML = `
        <table class="table table-sm table-borderless mb-4">
            <tbody>
                <tr>
                    <th style="width:40%">Plano</th>
                    <td>${billing.plan_name || '—'}</td>
                </tr>
                <tr>
                    <th>Status</th>
                    <td>${statusBadge}</td>
                </tr>
                ${billing.billing_cycle ? `<tr><th>Ciclo</th><td>${billing.billing_cycle === 'monthly' ? 'Mensal' : 'Anual'}</td></tr>` : ''}
                ${billing.price_cents ? `<tr><th>Valor</th><td>R$ ${fmtBRL(billing.price_cents)}${billing.billing_cycle === 'monthly' ? '/mês' : '/ano'}</td></tr>` : ''}
                ${trialInfo}
                ${billing.account_name ? `<tr><th>Empresa</th><td>${billing.account_name}</td></tr>` : ''}
            </tbody>
        </table>

        <div class="d-flex flex-wrap gap-2" style="gap:.5rem">
            ${billing.status === 'plan_required' ? `
                <a href="/plans" class="btn btn-primary"><i class="fas fa-rocket mr-1"></i>Escolher plano</a>
            ` : ''}
            ${billing.status === 'trialing' ? `
                <a href="/plans" class="btn btn-outline-primary"><i class="fas fa-exchange-alt mr-1"></i>Trocar plano</a>
                <button class="btn btn-success" disabled title="Disponível em breve">
                    <i class="fas fa-credit-card mr-1"></i>Assinar agora
                </button>
            ` : ''}
            ${['active','past_due'].includes(billing.status) ? `
                <button class="btn btn-outline-secondary" disabled title="Disponível em breve">
                    <i class="fas fa-cog mr-1"></i>Gerenciar cobrança
                </button>
            ` : ''}
            ${billing.status === 'expired' ? `
                <a href="/plans" class="btn btn-primary"><i class="fas fa-redo mr-1"></i>Reativar plano</a>
            ` : ''}
        </div>
        <p class="text-muted small mt-3">
            <i class="fas fa-info-circle mr-1"></i>
            Integração de pagamento disponível em breve. Enquanto isso, seu teste está ativo.
        </p>
    `;
});
</script>
<script src="/dist/js/theme.js"></script>
</body>
</html>
