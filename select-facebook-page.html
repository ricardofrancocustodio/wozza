<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecione sua Página | Wozza</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body { background: #f5f7fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .page-item { padding: 16px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; }
        .page-item:hover { border-color: #007bff; background: #f8f9fa; }
        .page-item.selected { border-color: #007bff; background: #e7f1ff; }
        .page-name { font-weight: 600; font-size: 16px; margin: 0; }
        .page-ig { font-size: 13px; color: #666; margin: 4px 0 0 0; }
    </style>
</head>
<body>
<div class="card" style="max-width: 500px; width: 90%;">
    <div class="card-body p-4">
        <h4 class="mb-4"><i class="fab fa-facebook mr-2"></i>Escolha sua Página</h4>
        <div id="pages-list"></div>
        <button id="confirm-btn" class="btn btn-primary btn-block mt-4" disabled>Continuar</button>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const state = params.get('state');
    const pagesJson = params.get('pages');

    if (!state || !pagesJson) {
        document.body.innerHTML = '<div class="alert alert-danger m-5">Erro: parâmetros inválidos</div>';
    } else {
        try {
            const pages = JSON.parse(decodeURIComponent(pagesJson));
            let selectedPageId = null;

            const list = document.getElementById('pages-list');
            pages.forEach(page => {
                const div = document.createElement('div');
                div.className = 'page-item';
                div.innerHTML = `
                    <div class="page-name">${page.name}</div>
                    <div class="page-ig">${page.ig ? '✅ Instagram vinculado' : '⚠️ Sem Instagram'}</div>
                `;
                div.onclick = () => {
                    document.querySelectorAll('.page-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedPageId = page.id;
                    document.getElementById('confirm-btn').disabled = false;
                };
                list.appendChild(div);
            });

            document.getElementById('confirm-btn').onclick = async () => {
                document.getElementById('confirm-btn').disabled = true;
                document.getElementById('confirm-btn').innerHTML = 'Processando...';
                try {
                    const res = await fetch('/api/auth/meta/select-page', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ state, page_id: selectedPageId, pages })
                    });
                    const data = await res.json();
                    if (data.ok) {
                        window.location.href = data.redirectTo;
                    } else {
                        alert('Erro: ' + data.error);
                        document.getElementById('confirm-btn').disabled = false;
                        document.getElementById('confirm-btn').innerHTML = 'Continuar';
                    }
                } catch (err) {
                    alert('Erro ao processar: ' + err.message);
                    document.getElementById('confirm-btn').disabled = false;
                    document.getElementById('confirm-btn').innerHTML = 'Continuar';
                }
            };
        } catch (err) {
            document.body.innerHTML = '<div class="alert alert-danger m-5">Erro ao processar páginas</div>';
        }
    }
</script>
</body>
</html>
