<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wozza | Redefinir senha</title>
  <link rel="stylesheet" href="/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="/adminlte/css/adminlte.min.css">
  <style>
    body { min-height: 100vh; margin: 0; background: #f5f7fb; display: flex; align-items: center; justify-content: center; padding: 24px; color: #1f2937; }
    .reset-card { width: 430px; max-width: 100%; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 32px; box-shadow: 0 18px 45px rgba(15, 23, 42, .12); }
    .brand { color: #0f766e; font-size: 28px; font-weight: 800; margin-bottom: 20px; }
    .form-control { height: 50px; border-radius: 8px; background: #f8fafc; }
    .rule { color: #94a3b8; font-size: 14px; margin-bottom: 4px; }
    .rule.ok { color: #0f766e; font-weight: 700; }
    .btn-primary { height: 50px; border-radius: 8px; font-weight: 700; background: #0f766e; border-color: #0f766e; }
    .hidden { display: none !important; }
  </style>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('wozza-theme');
        var theme = (stored === 'dark' || stored === 'light')
          ? stored
          : ((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (err) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="/dist/css/theme.css">
</head>
<body>
  <main class="reset-card">
    <div class="brand"><i class="fas fa-shield-alt mr-2"></i>Wozza</div>
    <h1 class="h3 font-weight-bold mb-2">Redefinir senha</h1>
    <p class="text-muted mb-4">Crie uma nova senha para sua conta.</p>
    <div id="msg" class="alert hidden" role="alert"></div>
    <form id="reset-form">
      <input type="password" id="password" class="form-control mb-3" placeholder="Nova senha" autocomplete="new-password" required>
      <input type="password" id="confirm-password" class="form-control mb-3" placeholder="Confirmar senha" autocomplete="new-password" required>
      <div class="mb-3" id="rules">
        <div class="rule" data-rule="min"><i class="fas fa-check mr-1"></i>Mínimo 8 caracteres</div>
        <div class="rule" data-rule="upper"><i class="fas fa-check mr-1"></i>Letra maiúscula</div>
        <div class="rule" data-rule="lower"><i class="fas fa-check mr-1"></i>Letra minúscula</div>
        <div class="rule" data-rule="number"><i class="fas fa-check mr-1"></i>Número</div>
        <div class="rule" data-rule="special"><i class="fas fa-check mr-1"></i>Caractere especial</div>
      </div>
      <button type="submit" id="submit-button" class="btn btn-primary btn-block" disabled>Salvar nova senha</button>
    </form>
    <p class="mt-4 mb-0 text-center"><a href="/login" style="color:#0f766e;font-weight:700;">Voltar ao login</a></p>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm-password');
    const button = document.getElementById('submit-button');
    const msg = document.getElementById('msg');

    function rules(value) {
      return { min: value.length >= 8, upper: /[A-Z]/.test(value), lower: /[a-z]/.test(value), number: /[0-9]/.test(value), special: /[^A-Za-z0-9]/.test(value) };
    }
    function refreshRules() {
      const current = rules(password.value);
      Object.entries(current).forEach(([key, ok]) => document.querySelector(`[data-rule="${key}"]`).classList.toggle('ok', ok));
      button.disabled = !Object.values(current).every(Boolean) || password.value !== confirmPassword.value || !token;
    }
    function show(type, text) {
      msg.className = `alert alert-${type}`;
      msg.textContent = text;
    }
    password.addEventListener('input', refreshRules);
    confirmPassword.addEventListener('input', refreshRules);
    if (!token) show('danger', 'Link inválido ou ausente.');

    document.getElementById('reset-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      button.disabled = true;
      button.innerHTML = '<span class="spinner-border spinner-border-sm mr-2"></span>Salvando';
      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: password.value, purpose: 'PASSWORD_RESET' })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Falha ao redefinir senha.');
        show('success', 'Senha redefinida com sucesso. Redirecionando...');
        setTimeout(() => window.location.href = data.redirectTo || '/dashboard', 900);
      } catch (err) {
        show('danger', err.message);
        button.disabled = false;
        button.textContent = 'Salvar nova senha';
      }
    });
  </script>
  <script src="/dist/js/theme.js"></script>
</body>
</html>
