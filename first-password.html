<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wozza | Primeira senha</title>
  <link rel="stylesheet" href="/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="/adminlte/css/adminlte.min.css">
  <style>
    html, body { min-height: 100%; }
    body { margin: 0; background: #f5f7fb; color: #1f2937; }
    .auth-shell { min-height: 100vh; display: grid; grid-template-columns: minmax(320px, .9fr) minmax(360px, 1.1fr); }
    .auth-panel { background: #0f172a; color: #fff; padding: 56px; display: flex; flex-direction: column; justify-content: center; }
    .auth-panel h1 { font-size: 40px; line-height: 1.08; font-weight: 800; margin-bottom: 18px; }
    .auth-panel p { max-width: 500px; color: #cbd5e1; font-size: 18px; }
    .auth-main { display: flex; align-items: center; justify-content: center; padding: 40px 24px; background: #fff; }
    .auth-box { width: 430px; max-width: 100%; }
    .brand { color: #0f766e; font-size: 30px; font-weight: 800; margin-bottom: 28px; }
    .form-control { height: 52px; border-radius: 8px; background: #f8fafc; }
    .input-group .form-control { border-radius: 8px 0 0 8px; }
    .input-group-text { width: 52px; justify-content: center; border-radius: 0 8px 8px 0; background: #f8fafc; }
    .btn-primary { height: 52px; border-radius: 8px; font-weight: 700; background: #0f766e; border-color: #0f766e; }
    .rule { color: #94a3b8; font-size: 14px; margin-bottom: 4px; }
    .rule.ok { color: #0f766e; font-weight: 700; }
    .auth-link { color: #0f766e; font-weight: 700; }
    .hidden { display: none !important; }
    @media (max-width: 900px) { .auth-shell { grid-template-columns: 1fr; } .auth-panel { padding: 32px; } .auth-panel h1 { font-size: 32px; } }
  </style>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-panel">
      <h1>Ative seu acesso.</h1>
      <p>Crie a senha inicial da sua conta Wozza.</p>
    </section>
    <section class="auth-main">
      <div class="auth-box">
        <div class="brand"><i class="fas fa-shield-alt mr-2"></i>Wozza</div>
        <div id="request-view">
          <h1 class="h3 font-weight-bold mb-2">Primeira senha</h1>
          <p class="text-muted mb-4">Informe o e-mail do convite.</p>
          <div id="request-msg" class="alert hidden" role="alert"></div>
          <form id="request-form">
            <input type="text" id="name" class="form-control mb-3" placeholder="Nome" autocomplete="name">
            <div class="input-group mb-4">
              <input type="email" id="email" class="form-control" placeholder="E-mail" autocomplete="email" required>
              <div class="input-group-append"><span class="input-group-text"><i class="fas fa-envelope"></i></span></div>
            </div>
            <button type="submit" id="request-button" class="btn btn-primary btn-block">Solicitar link</button>
          </form>
          <p class="mt-4 mb-0"><a class="auth-link" href="/login">Voltar ao login</a></p>
        </div>

        <div id="password-view" class="hidden">
          <h1 class="h3 font-weight-bold mb-2">Criar senha</h1>
          <p class="text-muted mb-4">Defina sua senha de acesso.</p>
          <div id="password-msg" class="alert hidden" role="alert"></div>
          <form id="password-form">
            <input type="password" id="password" class="form-control mb-3" placeholder="Senha" autocomplete="new-password" required>
            <input type="password" id="confirm-password" class="form-control mb-3" placeholder="Confirmar senha" autocomplete="new-password" required>
            <div class="mb-3">
              <div class="rule" data-rule="min"><i class="fas fa-check mr-1"></i>Mínimo 8 caracteres</div>
              <div class="rule" data-rule="upper"><i class="fas fa-check mr-1"></i>Letra maiúscula</div>
              <div class="rule" data-rule="lower"><i class="fas fa-check mr-1"></i>Letra minúscula</div>
              <div class="rule" data-rule="number"><i class="fas fa-check mr-1"></i>Número</div>
              <div class="rule" data-rule="special"><i class="fas fa-check mr-1"></i>Caractere especial</div>
            </div>
            <button type="submit" id="password-button" class="btn btn-primary btn-block" disabled>Salvar senha</button>
          </form>
        </div>
      </div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';
    const requestView = document.getElementById('request-view');
    const passwordView = document.getElementById('password-view');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirm-password');
    const passwordButton = document.getElementById('password-button');

    if (token) {
      requestView.classList.add('hidden');
      passwordView.classList.remove('hidden');
    }

    function show(id, type, text) {
      const box = document.getElementById(id);
      box.className = `alert alert-${type}`;
      box.textContent = text;
    }
    function rules(value) {
      return { min: value.length >= 8, upper: /[A-Z]/.test(value), lower: /[a-z]/.test(value), number: /[0-9]/.test(value), special: /[^A-Za-z0-9]/.test(value) };
    }
    function refreshRules() {
      const current = rules(password.value);
      Object.entries(current).forEach(([key, ok]) => document.querySelector(`[data-rule="${key}"]`).classList.toggle('ok', ok));
      passwordButton.disabled = !Object.values(current).every(Boolean) || password.value !== confirmPassword.value || !token;
    }

    password.addEventListener('input', refreshRules);
    confirmPassword.addEventListener('input', refreshRules);

    document.getElementById('request-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const button = document.getElementById('request-button');
      button.disabled = true;
      button.innerHTML = '<span class="spinner-border spinner-border-sm mr-2"></span>Enviando';
      try {
        const response = await fetch('/api/auth/first-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value, name: document.getElementById('name').value })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Falha ao solicitar primeira senha.');
        show('request-msg', 'success', data.message);
      } catch (err) {
        show('request-msg', 'danger', err.message);
      } finally {
        button.disabled = false;
        button.textContent = 'Solicitar link';
      }
    });

    document.getElementById('password-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      passwordButton.disabled = true;
      passwordButton.innerHTML = '<span class="spinner-border spinner-border-sm mr-2"></span>Salvando';
      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: password.value, purpose: 'FIRST_PASSWORD' })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Falha ao criar senha.');
        show('password-msg', 'success', 'Senha criada com sucesso. Redirecionando...');
        setTimeout(() => window.location.href = data.redirectTo || '/dashboard', 900);
      } catch (err) {
        show('password-msg', 'danger', err.message);
        passwordButton.disabled = false;
        passwordButton.textContent = 'Salvar senha';
      }
    });
  </script>
</body>
</html>
